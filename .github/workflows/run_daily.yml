name: Run Daily MLB Scraper

on:
  # Allows you to click a button on your phone/browser to run it "on the go"
  workflow_dispatch: 
  
  # Optional: Automatically runs it every day at 8:00 AM UTC (4:00 AM EST)
  schedule:
    - cron: '0 8 * * *'

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # 1. Downloads your code from GitHub into the cloud server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Sets up Python on the cloud server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Installs the requests library
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Runs your script and prints the MLB data to the log
    - name: Run MLB Scraper
      run: python mlb_scraper.py
